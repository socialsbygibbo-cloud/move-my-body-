<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

 <title>Move My Body 💪</title>
 <link rel="icon" href="AF3F5008-E094-414F-AE08-AD4ADDB1867B.png">
<link rel="apple-touch-icon" href="AF3F5008-E094-414F-AE08-AD4ADDB1867B.png">
<link rel="icon" href="icon.jpg">
<link rel="apple-touch-icon" href="icon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink: #FF6B9D;
    --orange: #FF8C42;
    --purple: #9B59B6;
    --blue: #6C8EBF;
    --green: #4CAF82;
    --cream: #F5E6D3;
    --bg: #160A1C;
    --surface: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.11);
  }
  html, body {
    min-height: 100vh;
    background: linear-gradient(160deg, #1A0A1E 0%, #2D0A24 45%, #1A1208 100%);
    background-attachment: fixed;
    font-family: 'Inter', sans-serif;
    color: #fff;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  ::-webkit-scrollbar { width: 0; }

  .app { max-width: 480px; margin: 0 auto; padding: 0 18px 80px; }

  /* ── HEADER ── */
  .header {
    padding: 26px 0 18px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .logo {
    font-size: 21px; font-weight: 900; letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--pink), var(--orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .tagline { color: rgba(245,230,211,0.45); font-size: 11px; font-weight: 500; margin-top: 2px; }
  .streak-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,140,66,0.14);
    border: 1.5px solid rgba(255,140,66,0.3);
    border-radius: 20px; padding: 6px 14px;
    font-weight: 700; font-size: 14px; color: var(--orange);
    white-space: nowrap;
  }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 8px; margin-bottom: 26px;
    background: rgba(255,255,255,0.04);
    border-radius: 18px; padding: 4px;
  }
  .tab {
    flex: 1; padding: 10px; border-radius: 14px;
    border: 1px solid transparent;
    background: transparent;
    color: rgba(245,230,211,0.4); font-weight: 500; font-size: 13px;
    cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .tab.active {
    background: rgba(255,107,157,0.14);
    border-color: rgba(255,107,157,0.35);
    color: var(--pink); font-weight: 700;
  }

  /* ── SECTIONS ── */
  .section { margin-bottom: 26px; }
  .section-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 11px; }
  .section-label { font-size: 15px; font-weight: 800; }
  .section-hint { font-size: 11px; color: rgba(245,230,211,0.3); font-weight: 500; }

  /* ── PILLS ── */
  .pills { display: flex; flex-wrap: wrap; gap: 9px; }
  .pill {
    display: flex; align-items: center; gap: 6px;
    padding: 11px 18px; border-radius: 50px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: rgba(245,230,211,0.8); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.18s cubic-bezier(.34,1.56,.64,1);
    font-family: inherit; white-space: nowrap;
    user-select: none;
  }
  .pill.selected {
    color: #fff; font-weight: 700;
    transform: scale(1.07);
  }

  /* ── CTA BUTTONS ── */
  .btn-main {
    width: 100%; padding: 21px;
    border: none; border-radius: 20px;
    font-size: 19px; font-weight: 900; letter-spacing: 0.2px;
    cursor: pointer; font-family: inherit;
    transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
    color: rgba(245,230,211,0.25);
    background: rgba(255,255,255,0.06);
  }
  .btn-main.ready {
    background: linear-gradient(135deg, var(--pink), var(--orange));
    color: #fff;
    box-shadow: 0 8px 30px rgba(255,107,157,0.4);
  }
  .btn-main.ready:active { transform: scale(0.97); }
  .btn-secondary {
    width: 100%; padding: 15px;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid var(--border);
    border-radius: 17px; font-size: 14px; font-weight: 700;
    color: rgba(245,230,211,0.65); cursor: pointer;
    transition: all 0.18s; font-family: inherit; margin-top: 11px;
  }
  .btn-secondary:active { transform: scale(0.98); }

  /* ── WORKOUT CARD ── */
  .card {
    background: linear-gradient(145deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
    border-radius: 28px; padding: 24px 20px;
    border: 1.5px solid var(--border);
  }
  .card-tag {
    display: inline-block;
    border-radius: 20px; padding: 4px 13px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.6px;
    margin-bottom: 14px;
  }
  .card-title { font-size: 24px; font-weight: 900; letter-spacing: -0.4px; line-height: 1.2; margin-bottom: 3px; }
  .card-subtitle { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; margin-bottom: 20px; }

  /* ── PROGRESS BAR ── */
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: rgba(245,230,211,0.4); font-weight: 600; margin-bottom: 6px; }
  .progress-track { height: 5px; border-radius: 10px; background: rgba(255,255,255,0.08); overflow: hidden; margin-bottom: 18px; }
  .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--pink), var(--orange)); transition: width 0.3s ease; }

  /* ── MOVE LIST ── */
  .move-list { margin-bottom: 18px; }
  .move-row {
    display: flex; align-items: flex-start; gap: 13px;
    padding: 13px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    cursor: pointer; user-select: none;
    background: none; border-left: none; border-right: none; border-top: none;
    width: 100%; text-align: left; font-family: inherit;
  }
  .move-row:last-child { border-bottom: none; }
  .move-check {
    width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0; margin-top: 1px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; font-size: 13px;
  }
  .move-check.done {
    background: linear-gradient(135deg, var(--pink), var(--orange));
    border: none; box-shadow: 0 2px 10px rgba(255,107,157,0.4);
    color: #fff;
  }
  .move-name {
    font-size: 15px; font-weight: 600; color: #fff;
    line-height: 1.35; transition: all 0.2s;
  }
  .move-name.done { color: rgba(245,230,211,0.35); text-decoration: line-through; }
  .move-reps {
    display: inline-block; margin-left: 8px;
    font-size: 11px; font-weight: 700;
    background: rgba(255,107,157,0.18);
    border: 1px solid rgba(255,107,157,0.3);
    border-radius: 8px; padding: 2px 8px;
    color: var(--pink); vertical-align: middle;
  }
  .move-note { font-size: 12px; color: rgba(245,230,211,0.38); margin-top: 3px; font-style: italic; }

  /* ── YT BUTTON ── */
  .yt-btn {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px; padding: 13px;
    color: rgba(245,230,211,0.6); font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px;
    font-family: inherit; margin-bottom: 18px;
    transition: background 0.18s;
  }
  .yt-btn:hover { background: rgba(255,255,255,0.09); }
  .yt-embed { border-radius: 14px; overflow: hidden; aspect-ratio: 16/9; margin-bottom: 18px; }
  .yt-embed iframe { display: block; width: 100%; height: 100%; border: none; }

  /* ── LOG BUTTON ── */
  .btn-log {
    flex: 1; padding: 17px;
    border: none; border-radius: 16px;
    font-size: 15px; font-weight: 800;
    font-family: inherit; cursor: default;
    transition: all 0.25s; letter-spacing: 0.2px;
    background: rgba(255,255,255,0.08);
    color: rgba(245,230,211,0.35);
    border: 1.5px solid rgba(255,255,255,0.1);
  }
  .btn-log.ready {
    background: linear-gradient(135deg, var(--pink), var(--orange));
    color: #fff; cursor: pointer;
    box-shadow: 0 6px 24px rgba(255,107,157,0.4);
    border: none;
  }
  .btn-log.ready:active { transform: scale(0.97); }
  .btn-fave {
    padding: 17px 18px;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid var(--border);
    border-radius: 16px; font-size: 19px;
    cursor: pointer; transition: all 0.18s; font-family: inherit;
  }
  .btn-fave.active {
    background: rgba(255,107,157,0.18);
    border-color: var(--pink);
  }
  .card-actions { display: flex; gap: 10px; }

  /* ── BACK LINK ── */
  .back-btn {
    background: none; border: none; color: var(--pink);
    font-size: 13px; font-weight: 700; cursor: pointer;
    padding: 0 0 18px; display: flex; align-items: center;
    gap: 5px; font-family: inherit;
  }

  /* ── CELEBRATION ── */
  .celebration { text-align: center; padding: 36px 16px; }
  .celebration-emoji { font-size: 60px; margin-bottom: 14px; }
  .celebration-title {
    font-size: 26px; font-weight: 900;
    background: linear-gradient(90deg, var(--pink), var(--orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .celebration-streak { color: var(--orange); font-weight: 700; font-size: 15px; margin-bottom: 8px; }
  .celebration-note { color: rgba(245,230,211,0.4); font-size: 13px; line-height: 1.6; margin-bottom: 28px; }
  .btn-again {
    background: linear-gradient(135deg, var(--pink), var(--orange));
    border: none; border-radius: 16px; padding: 15px 30px;
    color: #fff; font-weight: 800; font-size: 15px;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 6px 22px rgba(255,107,157,0.4);
  }

  /* ── FAVES ── */
  .fave-list { display: flex; flex-direction: column; gap: 12px; }
  .fave-card {
    background: rgba(255,255,255,0.05);
    border-radius: 18px; padding: 15px 18px;
    border: 1.5px solid rgba(255,255,255,0.09);
    display: flex; justify-content: space-between;
    align-items: center; cursor: pointer;
    transition: background 0.18s;
  }
  .fave-card:hover { background: rgba(255,255,255,0.08); }
  .fave-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
  .fave-title { font-size: 16px; font-weight: 800; color: #fff; }
  .fave-meta { font-size: 11px; color: rgba(245,230,211,0.35); margin-top: 3px; }
  .fave-remove {
    background: none; border: none; font-size: 20px;
    cursor: pointer; padding: 4px; flex-shrink: 0;
  }
  .empty-state { text-align: center; padding: 56px 20px; }
  .empty-emoji { font-size: 44px; margin-bottom: 14px; }
  .empty-text { color: rgba(245,230,211,0.4); font-size: 14px; line-height: 1.6; }

  /* ── SCREEN TRANSITIONS ── */
  .screen { display: none; }
  .screen.active { display: block; animation: pop 0.32s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes pop {
    0% { transform: scale(0.94); opacity: 0; }
    65% { transform: scale(1.02); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: linear-gradient(135deg, var(--pink), var(--orange));
    color: #fff; font-weight: 700; font-size: 14px;
    padding: 12px 24px; border-radius: 50px;
    box-shadow: 0 6px 24px rgba(255,107,157,0.5);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none; z-index: 100; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<div class="app">
  <div class="header">
    <div>
      <div class="logo">Move My Body 💪</div>
      <div class="tagline">just tell me what to do</div>
    </div>
    <div class="streak-badge" id="streakBadge">🔥 <span id="streakNum">0</span> days</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="home" onclick="switchTab('home')">🏃 Move</button>
    <button class="tab" data-tab="faves" onclick="switchTab('faves')">💖 Saved (<span id="faveCount">0</span>)</button>
  </div>

  <!-- ── HOME SCREEN ── -->
  <div id="screen-home" class="screen active">
    <div class="section">
      <div class="section-header">
        <span class="section-label">How's your energy?</span>
        <span class="section-hint">be honest 👇</span>
      </div>
      <div class="pills" id="pills-energy"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-label">Time available?</span>
        <span class="section-hint">be realistic 🕰</span>
      </div>
      <div class="pills" id="pills-time"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <span class="section-label">Where are you?</span>
        <span class="section-hint">right now 📍</span>
      </div>
      <div class="pills" id="pills-location"></div>
    </div>
    <button class="btn-main" id="btnGo" onclick="handleGo()">Pick your options above</button>
    <button class="btn-secondary" onclick="handleRandom()">🎲 Surprise me</button>
  </div>

  <!-- ── RESULT SCREEN ── -->
  <div id="screen-result" class="screen">
    <button class="back-btn" onclick="switchTab('home')">← Back</button>
    <div id="resultArea"></div>
  </div>

  <!-- ── FAVOURITES SCREEN ── -->
  <div id="screen-faves" class="screen">
    <div id="favesArea"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ─── STATE & STORAGE ──────────────────────────────────────────────────────────
const STORAGE_KEY = 'mmb_state_v3';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { streak: 0, lastLog: null, favourites: [], history: [] };
}

function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
}

let state = loadState();
let selections = { energy: null, time: null, location: null };
let currentWorkout = null;
let checkedMoves = {};

// ─── PILL CONFIG ─────────────────────────────────────────────────────────────
const ENERGIES = [
  { value:"dead", label:"Dead 💀", color:"#9B59B6" },
  { value:"low",  label:"Low 😴",  color:"#6C8EBF" },
  { value:"med",  label:"Medium 🙂",color:"#FF8C42" },
  { value:"high", label:"High ⚡",  color:"#FF6B9D" },
];
const TIMES = [
  { value:"5",  label:"5 mins" },
  { value:"10", label:"10 mins" },
  { value:"20", label:"20 mins" },
  { value:"45", label:"45 mins" },
];
const LOCATIONS = [
  { value:"home",    label:"🏠 Home" },
  { value:"outside", label:"🌿 Outside" },
  { value:"gym",     label:"🏋️ Gym" },
];

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  buildPills('pills-energy', ENERGIES, 'energy', '#FF6B9D');
  buildPills('pills-time', TIMES, 'time', '#FF6B9D');
  buildPills('pills-location', LOCATIONS, 'location', '#FF8C42');
  updateStreak();
  updateFaveCount();
}

function buildPills(containerId, items, group, defaultColor) {
  const c = document.getElementById(containerId);
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.textContent = item.label;
    btn.dataset.value = item.value;
    btn.dataset.group = group;
    btn.dataset.color = item.color || defaultColor;
    btn.onclick = () => selectPill(btn, group, item.value, item.color || defaultColor);
    c.appendChild(btn);
  });
}

function selectPill(btn, group, value, color) {
  // deselect others in group
  document.querySelectorAll(`[data-group="${group}"]`).forEach(p => {
    p.classList.remove('selected');
    p.style.background = '';
    p.style.borderColor = '';
    p.style.boxShadow = '';
  });
  btn.classList.add('selected');
  btn.style.background = color;
  btn.style.borderColor = color;
  btn.style.boxShadow = `0 4px 18px ${color}55`;
  selections[group] = value;
  updateGoButton();
}

function updateGoButton() {
  const btn = document.getElementById('btnGo');
  const ready = selections.energy && selections.time && selections.location;
  btn.textContent = ready ? '🚀 Tell me what to do' : 'Pick your options above';
  btn.className = ready ? 'btn-main ready' : 'btn-main';
}

function updateStreak() {
  document.getElementById('streakNum').textContent = state.streak;
}

function updateFaveCount() {
  document.getElementById('faveCount').textContent = state.favourites.length;
}

// ─── WORKOUT LOGIC ────────────────────────────────────────────────────────────
function getWorkout(energy, time, location) {
  // energy mapping: "med" stored internally but workout ids use "med"
  const id = `${energy}-${time}-${location}`;
  return WORKOUTS.find(w => w.id === id)
    || WORKOUTS.find(w => w.energy === energy && w.time === time)
    || WORKOUTS[0];
}

function handleGo() {
  if (!selections.energy || !selections.time || !selections.location) return;
  // map pill values to workout ids
  const eMap = {dead:'dead', low:'low', med:'medium', high:'high'};
  const energy = eMap[selections.energy] || selections.energy;
  currentWorkout = getWorkout(energy, selections.time, selections.location);
  checkedMoves = {};
  showResult(false);
}

function handleRandom() {
  currentWorkout = WORKOUTS[Math.floor(Math.random() * WORKOUTS.length)];
  checkedMoves = {};
  showResult(false);
}

// ─── SCREENS ─────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

  if (tab === 'home') {
    document.getElementById('screen-home').classList.add('active');
  } else if (tab === 'faves') {
    renderFaves();
    document.getElementById('screen-faves').classList.add('active');
  } else if (tab === 'result') {
    document.getElementById('screen-result').classList.add('active');
  }
}

function showResult(celebrated) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const rs = document.getElementById('screen-result');
  rs.classList.add('active');
  if (celebrated) {
    renderCelebration();
  } else {
    renderWorkoutCard();
  }
}

// ─── RENDER WORKOUT CARD ──────────────────────────────────────────────────────
function renderWorkoutCard() {
  const w = currentWorkout;
  const isFaved = state.favourites.includes(w.id);
  const isYT = ['stretch','nervous','pilates','mobility'].includes(w.type) && w.youtubeId;
  const total = w.moves.length;
  const doneCount = Object.values(checkedMoves).filter(Boolean).length;
  const allDone = doneCount === total;
  const pct = total ? (doneCount / total) * 100 : 0;

  let movesHTML = w.moves.map((m, i) => {
    const done = !!checkedMoves[i];
    return `
      <button class="move-row" onclick="toggleMove(${i})">
        <div class="move-check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
        <div style="flex:1">
          <div class="move-name ${done ? 'done' : ''}">
            ${m.n}${m.r ? `<span class="move-reps">${m.r}</span>` : ''}
          </div>
          ${m.note ? `<div class="move-note">${m.note}</div>` : ''}
        </div>
      </button>`;
  }).join('');

  let ytHTML = '';
  if (isYT) {
    ytHTML = `<button class="yt-btn" id="ytBtn" onclick="openYT('${w.youtubeId}')">▶️ Watch along on YouTube (optional)</button>`;
  }

  document.getElementById('resultArea').innerHTML = `
    <p style="color:rgba(245,230,211,0.4);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px">Your move today</p>
    <div class="card">
      <div class="card-tag" style="background:${w.color}28;border:1px solid ${w.color}55;color:${w.color}">${w.tag}</div>
      <div class="card-title">${w.title}</div>
      <div class="card-subtitle" style="color:${w.color}">${w.subtitle}</div>

      <div class="progress-meta">
        <span>Your moves</span>
        <span id="progressText">${doneCount}/${total} done</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:${pct}%"></div>
      </div>

      <div class="move-list" id="moveList">${movesHTML}</div>

      ${ytHTML}

      <div class="card-actions">
        <button class="btn-log ${allDone ? 'ready' : ''}" id="btnLog" onclick="${allDone ? 'logWorkout()' : ''}">
          ${allDone ? '✅ Log it!' : `${total - doneCount} move${total - doneCount !== 1 ? 's' : ''} to go`}
        </button>
        <button class="btn-fave ${isFaved ? 'active' : ''}" id="btnFave" onclick="toggleFave()">
          ${isFaved ? '💖' : '🤍'}
        </button>
      </div>
    </div>
    <button class="btn-secondary" onclick="handleRandom()">🎲 Give me a different one</button>
  `;
}

function toggleMove(i) {
  checkedMoves[i] = !checkedMoves[i];
  // Re-render just the moves + progress (fast)
  const w = currentWorkout;
  const total = w.moves.length;
  const doneCount = Object.values(checkedMoves).filter(Boolean).length;
  const allDone = doneCount === total;
  const pct = total ? (doneCount / total) * 100 : 0;

  // update progress
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${doneCount}/${total} done`;

  // update move list
  document.getElementById('moveList').innerHTML = w.moves.map((m, idx) => {
    const done = !!checkedMoves[idx];
    return `
      <button class="move-row" onclick="toggleMove(${idx})">
        <div class="move-check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
        <div style="flex:1">
          <div class="move-name ${done ? 'done' : ''}">
            ${m.n}${m.r ? `<span class="move-reps">${m.r}</span>` : ''}
          </div>
          ${m.note ? `<div class="move-note">${m.note}</div>` : ''}
        </div>
      </button>`;
  }).join('');

  // update log button
  const btn = document.getElementById('btnLog');
  btn.className = `btn-log ${allDone ? 'ready' : ''}`;
  btn.setAttribute('onclick', allDone ? 'logWorkout()' : '');
  btn.textContent = allDone ? '✅ Log it!' : `${total - doneCount} move${total - doneCount !== 1 ? 's' : ''} to go`;
}

function openYT(id) {
  const container = document.getElementById('ytBtn') || document.querySelector('.yt-btn');
  if (!container) return;
  const div = document.createElement('div');
  div.className = 'yt-embed';
  div.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
  container.replaceWith(div);
}

function toggleFave() {
  const id = currentWorkout.id;
  const idx = state.favourites.indexOf(id);
  if (idx >= 0) {
    state.favourites.splice(idx, 1);
    showToast('Removed from saved 🤍');
  } else {
    state.favourites.push(id);
    showToast('Saved! 💖');
  }
  saveState(state);
  updateFaveCount();
  const btn = document.getElementById('btnFave');
  const isFaved = state.favourites.includes(id);
  btn.className = `btn-fave ${isFaved ? 'active' : ''}`;
  btn.textContent = isFaved ? '💖' : '🤍';
}

function logWorkout() {
  const today = new Date().toDateString();
  if (state.lastLog !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    state.streak = state.lastLog === yesterday ? state.streak + 1 : 1;
    state.lastLog = today;
  }
  // add to history
  state.history = state.history || [];
  state.history.unshift({ id: currentWorkout.id, title: currentWorkout.title, date: today });
  if (state.history.length > 30) state.history = state.history.slice(0, 30);
  saveState(state);
  updateStreak();
  showResult(true);
}

function renderCelebration() {
  document.getElementById('resultArea').innerHTML = `
    <div class="celebration">
      <div class="celebration-emoji">🔥</div>
      <div class="celebration-title">You did it!</div>
      <div class="celebration-streak">🔥 ${state.streak} day streak</div>
      <div class="celebration-note">Moving your body is the most loving thing you can do for yourself.</div>
      <button class="btn-again" onclick="resetHome()">💪 Move again tomorrow</button>
    </div>
  `;
}

function resetHome() {
  selections = { energy: null, time: null, location: null };
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('selected');
    p.style.background = '';
    p.style.borderColor = '';
    p.style.boxShadow = '';
  });
  updateGoButton();
  switchTab('home');
}

// ─── FAVOURITES ───────────────────────────────────────────────────────────────
function renderFaves() {
  const area = document.getElementById('favesArea');
  const faved = WORKOUTS.filter(w => state.favourites.includes(w.id));

  if (faved.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <div class="empty-emoji">🤍</div>
        <div class="empty-text">Tap 🤍 on any workout to save it here for quick access.</div>
      </div>`;
    return;
  }

  area.innerHTML = `<div class="fave-list">${faved.map(w => `
    <div class="fave-card" onclick="openFave('${w.id}')">
      <div>
        <div class="fave-tag" style="color:${w.color}">${w.tag}</div>
        <div class="fave-title">${w.title}</div>
        <div class="fave-meta">${w.moves.length} moves · ${w.time} min</div>
      </div>
      <button class="fave-remove" onclick="removeFaveCard(event,'${w.id}')">💖</button>
    </div>`).join('')}
  </div>`;
}

function openFave(id) {
  currentWorkout = WORKOUTS.find(w => w.id === id);
  checkedMoves = {};
  showResult(false);
}

function removeFaveCard(e, id) {
  e.stopPropagation();
  const idx = state.favourites.indexOf(id);
  if (idx >= 0) state.favourites.splice(idx, 1);
  saveState(state);
  updateFaveCount();
  renderFaves();
  showToast('Removed from saved 🤍');
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── GO ───────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
